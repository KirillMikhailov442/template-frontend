services:
  frontend:
    image: ${APP_IMAGE:-template-frontend:latest}
    container_name: template_frontend_container
    ports:
      - "4173:4173"
    restart: always
    networks:
      - app

# Общая сеть с nginx и бэком (создаётся командой: docker network create app)
networks:
  app:
    external: true
